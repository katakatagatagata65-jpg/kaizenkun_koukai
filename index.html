<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>改善BOX - 社内意見収集・改善ワークフロー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg0:#060c1a;--bg1:#0b1426;--card:#101c34;--card2:#152040;
      --border:#1c2e50;--border2:#253a60;
      --accent:#f97316;--accent-h:#ea6a0a;--accent2:#22d3ee;
      --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
      --green:#34d399;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;
      --radius:10px;--radius-sm:6px;--radius-lg:14px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg0);color:var(--text);font-family:'DM Sans','Noto Sans JP',sans-serif;min-height:100vh;line-height:1.5}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.025) 1px,transparent 0);background-size:36px 36px;pointer-events:none;z-index:0}
    #root{position:relative;z-index:1}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
    .fade-up{animation:fadeUp .35s ease both}
    .fade-in{animation:fadeIn .25s ease both}
    .spin{animation:spin 1s linear infinite}
    .pulse{animation:pulse 1.4s ease infinite}

    /* Base elements */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .18s;border:1px solid transparent;line-height:1;text-decoration:none;white-space:nowrap}
    .btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
    .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-primary:hover:not(:disabled){background:var(--accent-h);transform:translateY(-1px)}
    .btn-primary:active{transform:translateY(0)}
    .btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
    .btn-ghost:hover:not(:disabled){background:var(--card);color:var(--text);border-color:var(--border2)}
    .btn-cyan{background:rgba(34,211,238,.12);color:var(--accent2);border-color:rgba(34,211,238,.3)}
    .btn-cyan:hover:not(:disabled){background:rgba(34,211,238,.22)}
    .btn-danger{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.3)}
    .btn-danger:hover:not(:disabled){background:rgba(248,113,113,.22)}
    .btn-green{background:rgba(52,211,153,.12);color:var(--green);border-color:rgba(52,211,153,.3)}
    .btn-green:hover:not(:disabled){background:rgba(52,211,153,.22)}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-lg{padding:11px 22px;font-size:15px}

    .input{width:100%;padding:9px 13px;background:var(--bg0);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;transition:border-color .2s;outline:none}
    .input:focus{border-color:var(--accent)}
    .input::placeholder{color:var(--text3)}
    textarea.input{resize:vertical;line-height:1.65}
    select.input{cursor:pointer}

    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
    .card-sm{padding:14px 16px}

    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.02em}
    .dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}

    .label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
    .divider{height:1px;background:var(--border);margin:16px 0}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

    .vote-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;transition:all .18s;font-family:inherit;font-weight:500}
    .vote-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(249,115,22,.08)}
    .vote-btn.voted{background:rgba(249,115,22,.14);border-color:rgba(249,115,22,.45);color:var(--accent)}

    .tag-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
    .tag-scroll::-webkit-scrollbar{display:none}

    .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;animation:fadeUp .3s ease;backdrop-filter:blur(12px)}
    .toast-ok{background:rgba(52,211,153,.18);border:1px solid rgba(52,211,153,.4);color:#34d399}
    .toast-warn{background:rgba(251,191,36,.18);border:1px solid rgba(251,191,36,.4);color:#fbbf24}
    .toast-err{background:rgba(248,113,113,.18);border:1px solid rgba(248,113,113,.4);color:#f87171}
    .toast-info{background:rgba(34,211,238,.18);border:1px solid rgba(34,211,238,.4);color:#22d3ee}

    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s ease}
    .score-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:5px}
    .score-fill{height:100%;border-radius:2px;transition:width .7s ease}

    .nav-link{padding:6px 12px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--text2);font-family:inherit;transition:all .18s;font-weight:500}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .nav-link.active{color:var(--accent);background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.25)}

    .post-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;cursor:pointer;transition:all .2s}
    .post-card:hover{border-color:rgba(249,115,22,.45);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.25)}

    .disc-item{display:flex;gap:10px;animation:fadeUp .25s ease}
    .disc-bubble{flex:1;background:rgba(255,255,255,.04);border-radius:0 var(--radius-sm) var(--radius-sm) var(--radius-sm);padding:9px 13px;font-size:13.5px;color:#cbd5e1;line-height:1.65;border:1px solid var(--border)}
    .disc-bubble.manager{border-color:rgba(129,140,248,.25);background:rgba(129,140,248,.06)}

    .toggle-track{width:40px;height:22px;border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
    .toggle-thumb{position:absolute;width:16px;height:16px;background:white;border-radius:50%;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}

    @media(max-width:640px){
      .grid-3{grid-template-columns:1fr}
      .hide-mobile{display:none}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Constants ──────────────────────────────────────────────────────────────
const CATEGORIES = ['業務改善','環境・設備','制度・福利厚生','コミュニケーション','技術・ツール','その他'];
const CRED = { id:'tomitake', pw:'tomitake_flush1998', name:'富武 花子', role:'manager' };
const LS = { POSTS:'kb_posts_v3', DISC:'kb_disc_v3', VOTES:'kb_votes_v3', KEY:'kb_apikey' };

const S = {
  pending:    { l:'検討中',     c:'#f59e0b', bg:'rgba(245,158,11,.12)' },
  assigned:   { l:'アサイン済', c:'#818cf8', bg:'rgba(129,140,248,.12)' },
  inprogress: { l:'対応中',     c:'#38bdf8', bg:'rgba(56,189,248,.12)' },
  hold:       { l:'保留',       c:'#94a3b8', bg:'rgba(148,163,184,.12)' },
  rejected:   { l:'却下',       c:'#f87171', bg:'rgba(248,113,113,.12)' },
  completed:  { l:'完了',       c:'#34d399', bg:'rgba(52,211,153,.12)' },
};
const I = {
  improvement: { l:'改善案',   c:'#34d399' },
  complaint:   { l:'不満',     c:'#f87171' },
  issue:       { l:'問題提起', c:'#fbbf24' },
  idea:        { l:'アイデア', c:'#60a5fa' },
};

// ─── Sample Data ────────────────────────────────────────────────────────────
const INIT_POSTS = [
  { id:'p1', content:'リモートワーク時にコミュニケーションツールが複数に分散していて情報共有がとてもしにくい状況です。Slack一本化を強く希望します。チーム間の連携も改善されると思います。', category:'コミュニケーション', anonymous:false, authorName:'山田 太郎', status:'assigned', votes:12, createdAt:new Date(Date.now()-7*864e5).toISOString(), aiSummary:'コミュニケーションツールのSlack一本化提案', aiIntent:'improvement', aiScore:78, aiUrgency:4, aiImpact:4, aiFeasibility:3, assignedTo:'tomitake', rejectionReason:null, parentPostId:null },
  { id:'p2', content:'オフィスの空調が極端です。夏は寒すぎ、冬は暑すぎる。個人個人が調整できる仕組みか、せめてゾーニングできる設備を導入してほしい。', category:'環境・設備', anonymous:true, authorName:null, status:'pending', votes:8, createdAt:new Date(Date.now()-3*864e5).toISOString(), aiSummary:'オフィス空調の個別温度調整機能要望', aiIntent:'complaint', aiScore:65, aiUrgency:3, aiImpact:3, aiFeasibility:2, assignedTo:null, rejectionReason:null, parentPostId:null },
  { id:'p3', content:'有給休暇の取得率が低い現状を改善したいです。取得しやすい雰囲気づくりと、年5日以上の強制取得など奨励制度の導入をお願いします。社員のウェルネス向上にも繋がります。', category:'制度・福利厚生', anonymous:false, authorName:'鈴木 花子', status:'inprogress', votes:20, createdAt:new Date(Date.now()-14*864e5).toISOString(), aiSummary:'有給休暇取得促進のための制度整備要望', aiIntent:'issue', aiScore:88, aiUrgency:4, aiImpact:5, aiFeasibility:4, assignedTo:'tomitake', rejectionReason:null, parentPostId:null },
  { id:'p4', content:'社内PCが老朽化していて処理が非常に遅く、業務効率が大幅に落ちています。少なくとも5年以上経過したPCの早急な入れ替えをお願いしたい。', category:'技術・ツール', anonymous:false, authorName:'田中 次郎', status:'rejected', votes:5, createdAt:new Date(Date.now()-30*864e5).toISOString(), aiSummary:'老朽化PC更新による業務効率改善要望', aiIntent:'issue', aiScore:72, aiUrgency:4, aiImpact:4, aiFeasibility:2, assignedTo:'tomitake', rejectionReason:'今年度の予算が確保されていないため、来年度の予算申請に含める方向で検討します。ご不便をおかけして大変申し訳ありません。', parentPostId:null },
  { id:'p5', content:'週1回の全社朝会が長すぎて業務時間を圧迫しています。15分以内に短縮するか、情報発信は録画＋テキスト共有にして必要な部署のみ参加の形式にしてほしい。', category:'業務改善', anonymous:true, authorName:null, status:'completed', votes:15, createdAt:new Date(Date.now()-45*864e5).toISOString(), aiSummary:'全社朝会の短縮・参加者見直し提案', aiIntent:'improvement', aiScore:82, aiUrgency:3, aiImpact:4, aiFeasibility:5, assignedTo:'tomitake', rejectionReason:null, parentPostId:null },
];
const INIT_DISC = {
  p1:[
    { id:'d1', postId:'p1', authorName:'富武 花子', isManager:true, message:'ご提案ありがとうございます。現状の各ツール使用状況を調査の上、移行コストと効果を比較検討します。', createdAt:new Date(Date.now()-864e5).toISOString() },
    { id:'d2', postId:'p1', authorName:'山田 太郎', isManager:false, message:'よろしくお願いします！現場の声も拾っていただけると助かります。', createdAt:new Date(Date.now()-432e5).toISOString() },
  ],
  p3:[
    { id:'d3', postId:'p3', authorName:'富武 花子', isManager:true, message:'有給取得促進キャンペーンを次の四半期から開始することが決定しました。詳細は別途全社連絡します。', createdAt:new Date(Date.now()-864e5*2).toISOString() },
    { id:'d4', postId:'p3', authorName:'鈴木 花子', isManager:false, message:'ありがとうございます！社員一同、前向きな対応を心より感謝します。', createdAt:new Date(Date.now()-864e5).toISOString() },
  ],
};

// ─── Utils ──────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,10);
const timeAgo = iso => {
  const s = (Date.now()-new Date(iso))/1000;
  if(s<60) return 'たった今';
  if(s<3600) return `${Math.floor(s/60)}分前`;
  if(s<86400) return `${Math.floor(s/3600)}時間前`;
  return `${Math.floor(s/86400)}日前`;
};
const fmtDate = iso => new Date(iso).toLocaleDateString('ja-JP',{year:'numeric',month:'short',day:'numeric'});
const lsGet = k => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch{ return null; } };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };

async function aiAnalyze(content, apiKey) {
  if(!apiKey) throw new Error('APIキー未設定');
  const prompt = `以下の社員意見を分析し、JSONのみ返してください（マークダウン・説明文不要）:\n"${content}"\n\n{"summary":"30字以内の要約","intent":"improvement|complaint|issue|ideaのいずれか1つ","urgency":1から5の整数,"impact":1から5の整数,"feasibility":1から5の整数,"score":0から100の整数}`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body:JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:400, messages:[{role:'user',content:prompt}] })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  const txt = data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
}

// ─── Atoms ──────────────────────────────────────────────────────────────────
const StatusBadge = ({status}) => {
  const cfg = S[status]; if(!cfg) return null;
  return <span className="badge" style={{background:cfg.bg,color:cfg.c,border:`1px solid ${cfg.c}40`}}><span className="dot" style={{background:cfg.c}}/>{cfg.l}</span>;
};
const IntentBadge = ({intent}) => {
  if(!intent||!I[intent]) return null;
  const cfg = I[intent];
  return <span className="badge" style={{background:`${cfg.c}18`,color:cfg.c,border:`1px solid ${cfg.c}30`}}>{cfg.l}</span>;
};
const CatBadge = ({cat}) => (
  <span className="badge" style={{background:'rgba(148,163,184,.1)',color:'#94a3b8',border:'1px solid rgba(148,163,184,.2)'}}>{cat}</span>
);
const ScoreBar = ({label,val,max=5,color}) => (
  <div>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#64748b',marginBottom:3}}>
      <span>{label}</span><span style={{color,fontWeight:600}}>{val}/{max}</span>
    </div>
    <div className="score-bar"><div className="score-fill" style={{width:`${(val/max)*100}%`,background:color}}/></div>
  </div>
);
const Avatar = ({name,size=32}) => {
  const colors = ['#f97316','#22d3ee','#a78bfa','#34d399','#f87171','#fbbf24','#60a5fa'];
  const c = name ? colors[name.charCodeAt(0)%colors.length] : '#64748b';
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:`${c}1e`,border:`1.5px solid ${c}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.36,color:c,fontWeight:700,flexShrink:0,userSelect:'none'}}>
      {name?name.slice(0,2):'匿'}
    </div>
  );
};
const Toggle = ({on,onChange}) => (
  <div className="toggle-track" style={{background:on?'var(--accent)':'var(--border2)'}} onClick={()=>onChange(!on)}>
    <div className="toggle-thumb" style={{left:on?21:3}}/>
  </div>
);
const Spinner = ({size=16}) => (
  <div className="spin" style={{width:size,height:size,border:`2px solid rgba(255,255,255,.2)`,borderTopColor:'white',borderRadius:'50%'}}/>
);
const Toast = ({msg,type}) => <div className={`toast toast-${type}`}>{msg}</div>;

// ─── Header ─────────────────────────────────────────────────────────────────
const Header = ({user,view,onNav,onLogout,onSettings}) => (
  <header style={{background:'rgba(6,12,26,.92)',backdropFilter:'blur(12px)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:100,padding:'0 20px'}}>
    <div style={{maxWidth:1200,margin:'0 auto',display:'flex',alignItems:'center',gap:12,height:54}}>
      <div style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer',marginRight:8}} onClick={()=>onNav('feed')}>
        <div style={{width:28,height:28,background:'linear-gradient(135deg,#f97316,#fb923c)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>💡</div>
        <span style={{fontSize:15,fontWeight:700,letterSpacing:'-.3px'}}>改善BOX</span>
      </div>
      <nav style={{display:'flex',gap:2,flex:1}}>
        {[{k:'feed',l:'フィード'},{k:'compose',l:'＋ 投稿'},...(user?.role==='manager'?[{k:'dashboard',l:'管理'}]:[])].map(n=>(
          <button key={n.k} className={`nav-link ${view===n.k?'active':''}`} onClick={()=>onNav(n.k)}>{n.l}</button>
        ))}
      </nav>
      <button className="btn btn-ghost btn-sm" style={{fontSize:16,padding:'5px 8px',lineHeight:1}} onClick={onSettings} title="設定">⚙</button>
      {user ? (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <Avatar name={user.name} size={26}/>
          <span className="hide-mobile" style={{fontSize:12,color:'#94a3b8'}}>{user.name}</span>
          <button className="btn btn-ghost btn-sm" onClick={onLogout}>ログアウト</button>
        </div>
      ) : (
        <button className="btn btn-ghost btn-sm" onClick={()=>onNav('login')}>管理職ログイン</button>
      )}
    </div>
  </header>
);

// ─── PostCard ────────────────────────────────────────────────────────────────
const PostCard = ({post,onDetail,onVote,voted}) => (
  <div className="post-card fade-up" onClick={()=>onDetail(post.id)}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
      <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
        <CatBadge cat={post.category}/>
        {post.aiIntent && <IntentBadge intent={post.aiIntent}/>}
        {post.parentPostId && <span className="badge" style={{background:'rgba(167,139,250,.15)',color:'#a78bfa',border:'1px solid rgba(167,139,250,.3)'}}>再提案</span>}
      </div>
      <StatusBadge status={post.status}/>
    </div>
    {post.aiSummary && (
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:5,fontWeight:500}}>{post.aiSummary}</p>
    )}
    <p style={{fontSize:13.5,color:'#cbd5e1',lineHeight:1.65,marginBottom:12,display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{post.content}</p>
    {post.aiScore != null && (
      <div style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#475569',marginBottom:3}}>
          <span>優先度スコア</span>
          <span style={{color:'#f97316',fontWeight:700}}>{post.aiScore}pt</span>
        </div>
        <div className="score-bar">
          <div className="score-fill" style={{width:`${post.aiScore}%`,background:'linear-gradient(90deg,#f97316,#fb923c)'}}/>
        </div>
      </div>
    )}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        {post.anonymous
          ? <span style={{fontSize:11,color:'#475569',display:'flex',alignItems:'center',gap:4}}><Avatar name={null} size={18}/> 匿名</span>
          : <><Avatar name={post.authorName} size={20}/><span style={{fontSize:12,color:'#64748b'}}>{post.authorName}</span></>
        }
        <span style={{fontSize:11,color:'#374151'}}>· {timeAgo(post.createdAt)}</span>
      </div>
      <button className={`vote-btn ${voted?'voted':''}`} onClick={e=>{e.stopPropagation();onVote(post.id);}}>

// ─── FeedView ────────────────────────────────────────────────────────────────
const FeedView = ({posts,filters,setFilters,onDetail,onVote,sessionVotes,onCompose}) => {
  const filtered = posts
    .filter(p=>filters.status==='all'||p.status===filters.status)
    .filter(p=>filters.cat==='all'||p.category===filters.cat)
    .sort((a,b)=>{
      if(filters.sort==='score') return (b.aiScore||0)-(a.aiScore||0);
      if(filters.sort==='votes') return b.votes-a.votes;
      return new Date(b.createdAt)-new Date(a.createdAt);
    });

  return (
    <div style={{maxWidth:1200,margin:'0 auto',padding:'22px 20px'}}>
      {/* Filters */}
      <div style={{marginBottom:18}}>
        <div className="tag-scroll" style={{marginBottom:10}}>
          {[{k:'all',l:'すべて'},...Object.entries(S).map(([k,v])=>({k,l:v.l}))].map(({k,l})=>(
            <button key={k} className="btn btn-sm" style={{whiteSpace:'nowrap',flexShrink:0,background:filters.status===k?`${S[k]?.c||'var(--accent)'}18`:'transparent',color:filters.status===k?S[k]?.c||'var(--accent)':'var(--text3)',border:`1px solid ${filters.status===k?`${S[k]?.c||'var(--accent)'}40`:'var(--border)'}`}} onClick={()=>setFilters(f=>({...f,status:k}))}>
              {l} {k!=='all'&&<span style={{opacity:.6,fontSize:10}}>({posts.filter(p=>p.status===k).length})</span>}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <select className="input" style={{width:'auto',fontSize:12,padding:'5px 10px'}} value={filters.cat} onChange={e=>setFilters(f=>({...f,cat:e.target.value}))}>
            <option value="all">カテゴリ: すべて</option>
            {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select className="input" style={{width:'auto',fontSize:12,padding:'5px 10px'}} value={filters.sort} onChange={e=>setFilters(f=>({...f,sort:e.target.value}))}>
            <option value="newest">新しい順</option>
            <option value="score">スコア順</option>
            <option value="votes">投票数順</option>
          </select>
          <span style={{fontSize:12,color:'var(--text3)',marginLeft:'auto'}}>{filtered.length}件</span>
        </div>
      </div>
      {/* Grid */}
      {filtered.length===0 ? (
        <div style={{textAlign:'center',padding:'64px 0',color:'var(--text3)'}}>
          <div style={{fontSize:36,marginBottom:12}}>📭</div>
          <p style={{fontSize:14}}>条件に合う意見が見つかりません</p>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:14}}>
          {filtered.map(p=><PostCard key={p.id} post={p} onDetail={onDetail} onVote={onVote} voted={sessionVotes.has(p.id)}/>)}
        </div>
      )}
      {/* FAB */}
      <button className="btn btn-primary" style={{position:'fixed',bottom:28,right:28,borderRadius:40,padding:'12px 20px',fontSize:14,boxShadow:'0 4px 20px rgba(249,115,22,.4)',gap:7}} onClick={onCompose}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 2v10M2 7h10"/></svg>
        意見を投稿
      </button>
    </div>
  );
};

// ─── DetailView ──────────────────────────────────────────────────────────────
const DetailView = ({post,discs,user,onBack,onVote,voted,onUpdateStatus,onAddDisc,onRetry}) => {
  const [msg,setMsg]       = useState('');
  const [discName,setDiscName] = useState('');
  const [showSt,setShowSt] = useState(false);
  const [newSt,setNewSt]   = useState(post.status);
  const [rejTxt,setRejTxt] = useState('');
  const discEnd = useRef(null);
  useEffect(()=>discEnd.current?.scrollIntoView({behavior:'smooth'}),[discs]);

  const handleStatus = () => {
    if(newSt==='rejected'&&!rejTxt.trim()) return;
    onUpdateStatus(post.id,newSt,newSt==='rejected'?rejTxt:null);
    setShowSt(false);
  };
  const handleDisc = () => {
    if(!msg.trim()) return;
    onAddDisc(post.id,msg.trim(),discName.trim());
    setMsg('');
  };

  return (
    <div style={{maxWidth:820,margin:'0 auto',padding:'22px 20px'}}>
      <button className="btn btn-ghost btn-sm" style={{marginBottom:14}} onClick={onBack}>← 一覧に戻る</button>

      {/* Main card */}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>

            <CatBadge cat={post.category}/>
            {post.aiIntent && <IntentBadge intent={post.aiIntent}/>}
            {post.parentPostId && <span className="badge" style={{background:'rgba(167,139,250,.15)',color:'#a78bfa',border:'1px solid rgba(167,139,250,.3)'}}>再提案</span>}
          </div>

        <p style={{fontSize:15,lineHeight:1.8,color:'#e2e8f0',marginBottom:16}}>{post.content}</p>

          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            {post.anonymous
              ? <><Avatar name={null} size={24}/><span style={{fontSize:13,color:'#64748b'}}>匿名投稿</span></>
              : <><Avatar name={post.authorName} size={24}/><span style={{fontSize:13,color:'#94a3b8'}}>{post.authorName}</span></>
            }
            <span style={{fontSize:12,color:'#475569'}}>{fmtDate(post.createdAt)}</span>
          </div>
          <button className={`vote-btn ${voted?'voted':''}`} style={{fontSize:14,padding:'6px 16px',gap:6}} onClick={()=>onVote(post.id)}>
            <svg width="11" height="11" viewBox="0 0 10 10" fill="currentColor"><path d="M5 1L9 8H1L5 1Z"/></svg>

      </div>

      {/* AI Analysis */}
      {post.aiScore!=null && (
        <div className="card fade-up" style={{marginBottom:14,borderColor:'rgba(34,211,238,.2)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{fontSize:13,fontWeight:700,color:'#22d3ee',display:'flex',alignItems:'center',gap:6}}>
              <span>✦</span> AI 分析レポート
            </span>
            <div style={{display:'flex',alignItems:'baseline',gap:5}}>
              <span style={{fontSize:28,fontWeight:800,color:'#f97316'}}>{post.aiScore}</span>
              <span style={{fontSize:13,color:'#64748b'}}>/100pt</span>
            </div>
          </div>
          {post.aiSummary && (
            <div style={{background:'rgba(34,211,238,.06)',borderRadius:7,padding:'9px 13px',marginBottom:14,fontSize:13.5,color:'#cbd5e1',borderLeft:'3px solid rgba(34,211,238,.5)',lineHeight:1.6}}>
              {post.aiSummary}
            </div>
          )}
          <div className="grid-3" style={{gap:14}}>
            <ScoreBar label="緊急度" val={post.aiUrgency||0} color="#f87171"/>
            <ScoreBar label="影響度" val={post.aiImpact||0} color="#fbbf24"/>
            <ScoreBar label="実現性" val={post.aiFeasibility||0} color="#34d399"/>
          </div>
        </div>
      )}

      {/* Rejection reason */}
      {post.status==='rejected' && post.rejectionReason && (
        <div className="card fade-up" style={{marginBottom:14,borderColor:'rgba(248,113,113,.3)',background:'rgba(248,113,113,.04)'}}>
          <div style={{fontSize:12,fontWeight:700,color:'#f87171',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
            <span>✕</span> 却下理由（公開）
          </div>
          <p style={{fontSize:13.5,color:'#fca5a5',lineHeight:1.7}}>{post.rejectionReason}</p>
          <div className="divider"/>
          <button className="btn btn-cyan" onClick={()=>onRetry(post.id)}>
            改善して再提案する →
          </button>
        </div>
      )}

        <div className="card fade-up" style={{marginBottom:14,borderColor:'rgba(129,140,248,.2)'}}>

            <span>⚙</span> 管理職操作
          </div>
          {!showSt ? (
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowSt(true)}>ステータスを変更する</button>

            <div>
              <label className="label" style={{marginBottom:6}}>新しいステータス</label>
              <select className="input" style={{marginBottom:10}} value={newSt} onChange={e=>setNewSt(e.target.value)}>
                {Object.entries(S).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
              </select>
              {newSt==='rejected' && (
                <>
                  <label className="label">却下理由 <span style={{color:'#f87171'}}>*</span></label>
                  <textarea className="input" rows={3} placeholder="却下理由を入力してください（全社公開されます）" value={rejTxt} onChange={e=>setRejTxt(e.target.value)} style={{marginBottom:10}}/>

              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary btn-sm" onClick={handleStatus} disabled={newSt==='rejected'&&!rejTxt.trim()}>更新する</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowSt(false)}>キャンセル</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Discussion */}
      <div className="card fade-up">
        <div style={{fontSize:13,fontWeight:700,marginBottom:16}}>💬 ディスカッション ({discs.length}件)</div>
        {discs.length===0 ? (
          <div style={{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:13,marginBottom:14}}>まだコメントがありません。最初のコメントを書いてみましょう。</div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:16,maxHeight:380,overflowY:'auto',paddingRight:4}}>
            {discs.map(d=>(
              <div key={d.id} className="disc-item">
                <Avatar name={d.authorName} size={32}/>
                <div style={{flex:1}}>
                  <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:4}}>
                    <span style={{fontSize:12.5,fontWeight:600,color:d.isManager?'#818cf8':'var(--text)'}}>{d.authorName}</span>
                    {d.isManager && <span className="badge" style={{fontSize:10,background:'rgba(129,140,248,.15)',color:'#818cf8',border:'1px solid rgba(129,140,248,.3)',padding:'1px 7px'}}>管理職</span>}
                    <span style={{fontSize:11,color:'#374151'}}>{timeAgo(d.createdAt)}</span>
                  </div>
                  <div className={`disc-bubble ${d.isManager?'manager':''}`}>{d.message}</div>
                </div>
              </div>
            ))}
            <div ref={discEnd}/>

        )}
        {!user && (
          <input className="input" style={{marginBottom:8}} placeholder="表示名（空白で「社員」になります）" value={discName} onChange={e=>setDiscName(e.target.value)}/>
        )}
        <div style={{display:'flex',gap:8}}>
          <input className="input" style={{flex:1}} value={msg} onChange={e=>setMsg(e.target.value)} placeholder="コメントを入力… (Enterで送信)" onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleDisc();}}}/>
          <button className="btn btn-primary btn-sm" onClick={handleDisc} disabled={!msg.trim()}>送信</button>
        </div>
      </div>
    </div>
  );
};

          <div style={{display:'flex',flexDirection:'column',gap:9}}>
            {top5.map((p,i)=>(
              <div key={p.id} style={{display:'flex',gap:12,alignItems:'center',padding:'12px 14px',borderRadius:9,background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',cursor:'pointer',transition:'all .18s'}}
                onClick={()=>onDetail(p.id)}
                onMouseEnter={e=>{ e.currentTarget.style.borderColor='rgba(249,115,22,.4)'; e.currentTarget.style.background='rgba(249,115,22,.05)'; }}
                onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='rgba(255,255,255,.03)'; }}>
                <div style={{fontSize:i<3?18:14,minWidth:26,textAlign:'center',fontWeight:800,color:i<3?undefined:'var(--text3)'}}>{rankMedals[i]}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:5,marginBottom:5,flexWrap:'wrap'}}>
                    <CatBadge cat={p.category}/>
                    {p.aiIntent&&<IntentBadge intent={p.aiIntent}/>}
                    <StatusBadge status={p.status}/>
                  </div>
                  <p style={{fontSize:13,color:'#cbd5e1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.aiSummary||p.content}</p>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:19,fontWeight:800,color:'#f97316'}}>{p.aiScore+p.votes*2}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>AI:{p.aiScore} 票:{p.votes*2}</div>
                </div>
                {p.status==='pending' && (
                  <button className="btn btn-cyan btn-sm" onClick={e=>{e.stopPropagation();onAssign(p.id);}}>アサイン</button>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Assigned posts */}
      <div className="card fade-up" style={{marginBottom:18,borderColor:'rgba(129,140,248,.2)'}}>
        <div style={{fontSize:14,fontWeight:700,color:'#818cf8',marginBottom:16,display:'flex',alignItems:'center',gap:7}}>
          📋 担当案件 ({assigned.length}件)
        </div>
        {assigned.length===0 ? (
          <div style={{color:'var(--text3)',textAlign:'center',padding:'24px 0',fontSize:13}}>現在、担当案件はありません</div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {assigned.map(p=>(
              <div key={p.id} style={{padding:'12px 14px',borderRadius:9,background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',cursor:'pointer',transition:'all .18s'}}
                onClick={()=>onDetail(p.id)}
                onMouseEnter={e=>{ e.currentTarget.style.borderColor='rgba(129,140,248,.4)'; }}
                onMouseLeave={e=>{ e.currentTarget.style.borderColor='var(--border)'; }}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',gap:5,marginBottom:6,flexWrap:'wrap'}}>
                      <CatBadge cat={p.category}/>
                      <StatusBadge status={p.status}/>
                    </div>
                    <p style={{fontSize:13,color:'#cbd5e1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.aiSummary||p.content}</p>
                    <div style={{fontSize:11,color:'#374151',marginTop:4}}>💬 {(discs[p.id]||[]).length}件 ・ ▲ {p.votes}票</div>
                  </div>
                  {p.aiScore&&<div style={{fontSize:16,fontWeight:700,color:'#f97316',marginLeft:14,flexShrink:0}}>{p.aiScore}pt</div>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Unassigned */}
      {unassigned.length > 0 && (
        <div className="card fade-up" style={{borderColor:'rgba(245,158,11,.2)'}}>
          <div style={{fontSize:14,fontWeight:700,color:'#f59e0b',marginBottom:16}}>⏳ 未アサインの意見 ({unassigned.length}件)</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {unassigned.map(p=>(
              <div key={p.id} style={{padding:'12px 14px',borderRadius:9,background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:5,marginBottom:5}}><CatBadge cat={p.category}/></div>
                  <p style={{fontSize:13,color:'#cbd5e1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.content}</p>
                </div>
                <button className="btn btn-cyan btn-sm" style={{flexShrink:0}} onClick={()=>onAssign(p.id)}>アサインする</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Settings Modal ───────────────────────────────────────────────────────────
const SettingsModal = ({apiKey,setApiKey,onClose}) => {
  const [val,setVal]   = useState(apiKey);
  const [show,setShow] = useState(false);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="card fade-up" style={{width:460,maxWidth:'calc(100vw - 32px)',maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:4}}>⚙ 設定</h3>
        <p style={{fontSize:12.5,color:'var(--text3)',marginBottom:18}}>Claude APIキーを設定するとAI分析機能が有効になります</p>
        <label className="label">Anthropic API Key</label>
        <div style={{position:'relative',marginBottom:8}}>
          <input className="input" type={show?'text':'password'} value={val} onChange={e=>setVal(e.target.value)} placeholder="sk-ant-api03-..."/>
          <button style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:12,padding:0}} onClick={()=>setShow(s=>!s)}>{show?'隠す':'表示'}</button>
        </div>
        <div style={{background:'rgba(34,211,238,.07)',border:'1px solid rgba(34,211,238,.2)',borderRadius:7,padding:'10px 13px',fontSize:12,color:'#94a3b8',marginBottom:18,lineHeight:1.65}}>
          ℹ APIキーはブラウザのlocalStorageに保存されます。<br/>
          APIキーなしでも投稿・閲覧・ディスカッション機能は利用可能ですが、AI分析は無効になります。
        </div>
        <div style={{marginBottom:16}}>
          <label className="label">デモ用サンプルデータをリセット</label>
          <button className="btn btn-danger btn-sm" onClick={()=>{
            if(!window.confirm('すべてのデータを初期化しますか？')) return;
            lsSet(LS.POSTS,INIT_POSTS); lsSet(LS.DISC,INIT_DISC); lsSet(LS.VOTES,[]);
            window.location.reload();
          }}>データをリセット</button>
        </div>
        <div className="divider"/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>キャンセル</button>
          <button className="btn btn-primary btn-sm" onClick={()=>{ setApiKey(val); lsSet(LS.KEY,val); onClose(); }}>保存する</button>
        </div>
      </div>
    </div>
  );
};

// ─── App ─────────────────────────────────────────────────────────────────────
const App = () => {
  const [posts,setPosts]       = useState([]);
  const [discs,setDiscs]       = useState({});
  const [user,setUser]         = useState(null);
  const [view,setView]         = useState('feed');
  const [detailId,setDetailId] = useState(null);
  const [retryId,setRetryId]   = useState(null);
  const [apiKey,setApiKey]     = useState('');
  const [filters,setFilters]   = useState({status:'all',cat:'all',sort:'newest'});
  const [toasts,setToasts]     = useState([]);
  const [sessionVotes,setSessionVotes] = useState(new Set());
  const [aiLoading,setAiLoading]       = useState(false);
  const [showSettings,setShowSettings] = useState(false);
  const [loaded,setLoaded]             = useState(false);

  // Load from localStorage
  useEffect(()=>{
    const p = lsGet(LS.POSTS);
    const d = lsGet(LS.DISC);
    const v = lsGet(LS.VOTES);
    const k = lsGet(LS.KEY);
    setPosts(p||INIT_POSTS);
    setDiscs(d||INIT_DISC);
    if(v) setSessionVotes(new Set(v));
    if(k) setApiKey(k);
    setLoaded(true);
  },[]);
  useEffect(()=>{ if(loaded) lsSet(LS.POSTS,posts); },[posts,loaded]);
  useEffect(()=>{ if(loaded) lsSet(LS.DISC,discs); },[discs,loaded]);
  useEffect(()=>{ if(loaded) lsSet(LS.VOTES,[...sessionVotes]); },[sessionVotes,loaded]);

  const toast$ = useCallback((msg,type='ok')=>{
    const id = uid();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  },[]);

  const nav = useCallback(v=>{
    setDetailId(null); setRetryId(null); setView(v);
  },[]);

  const vote = useCallback(postId=>{
    if(sessionVotes.has(postId)){ toast$('すでに賛同済みです','warn'); return; }
    setPosts(ps=>ps.map(p=>p.id===postId?{...p,votes:p.votes+1}:p));
    setSessionVotes(s=>{ const ns=new Set(s); ns.add(postId); return ns; });
    toast$('賛同しました！');
  },[sessionVotes,toast$]);

  const submitPost = useCallback(async({content,cat,anon,name,parentPostId})=>{
    const newPost = {
      id:uid(), content, category:cat, anonymous:anon, authorName:anon?null:(name||'社員'),
      status:'pending', votes:0, createdAt:new Date().toISOString(),
      aiSummary:null, aiIntent:null, aiScore:null, aiUrgency:null, aiImpact:null, aiFeasibility:null,
      assignedTo:null, rejectionReason:null, parentPostId:parentPostId||null,
    };
    setPosts(ps=>[newPost,...ps]);
    toast$('意見を投稿しました。AI分析中...');
    setAiLoading(true);
    try {
      const ai = await aiAnalyze(content,apiKey);
      setPosts(ps=>ps.map(p=>p.id===newPost.id?{...p,aiSummary:ai.summary,aiIntent:ai.intent,aiScore:ai.score,aiUrgency:ai.urgency,aiImpact:ai.impact,aiFeasibility:ai.feasibility}:p));
      toast$('AI分析が完了しました！');
    } catch(e) {
      toast$(apiKey?`AI分析に失敗しました: ${e.message}`:'APIキーが未設定のためAI分析をスキップしました','warn');
    }
    setAiLoading(false);
  },[apiKey,toast$]);

  const updateStatus = useCallback((postId,status,rejectionReason=null)=>{
    setPosts(ps=>ps.map(p=>p.id===postId?{...p,status,rejectionReason}:p));
    toast$('ステータスを更新しました');
  },[toast$]);

  const assignPost = useCallback(postId=>{
    setPosts(ps=>ps.map(p=>p.id===postId?{...p,status:'assigned',assignedTo:'tomitake'}:p));
    toast$('アサインしました');
  },[toast$]);

  const addDisc = useCallback((postId,message,guestName)=>{
    const msg = {
      id:uid(), postId,
      authorName:user?user.name:(guestName||'社員'),
      isManager:user?.role==='manager',
      message, createdAt:new Date().toISOString(),
    };
    setDiscs(d=>({...d,[postId]:[...(d[postId]||[]),msg]}));
  },[user]);

  const selectedPost = posts.find(p=>p.id===detailId);
  const retryPost    = posts.find(p=>p.id===retryId);

  if(!loaded) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text3)',gap:10}}>
      <Spinner size={20}/><span style={{fontSize:14}}>読み込み中...</span>
    </div>
  );

  return (
    <div>
      {/* Toasts */}
      <div className="toast-wrap">
        {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type}/>)}
      </div>
      {/* Settings */}
      {showSettings && <SettingsModal apiKey={apiKey} setApiKey={setApiKey} onClose={()=>setShowSettings(false)}/>}
      {/* Header */}
      <Header user={user} view={view} onNav={nav} onLogout={()=>{ setUser(null); nav('feed'); toast$('ログアウトしました'); }} onSettings={()=>setShowSettings(true)}/>
      {/* Content */}
      {detailId && selectedPost ? (
        <DetailView post={selectedPost} discs={discs[selectedPost.id]||[]} user={user} onBack={()=>setDetailId(null)} onVote={vote} voted={sessionVotes.has(selectedPost.id)} onUpdateStatus={updateStatus} onAddDisc={addDisc} onRetry={id=>{ setRetryId(id); setDetailId(null); }}/>
      ) : retryId && retryPost ? (
        <RetryView originalPost={retryPost} onSubmit={async fd=>{ await submitPost(fd); setRetryId(null); nav('feed'); }} onBack={()=>{ setDetailId(retryId); setRetryId(null); }} loading={aiLoading}/>
      ) : view==='login' ? (
        <LoginView onLogin={u=>{ setUser(u); nav('feed'); toast$(`ようこそ、${u.name}さん`); }} onBack={()=>nav('feed')}/>
      ) : view==='compose' ? (
        <ComposeView onSubmit={async fd=>{ await submitPost(fd); nav('feed'); }} onBack={()=>nav('feed')} loading={aiLoading}/>
      ) : view==='dashboard' && user?.role==='manager' ? (
        <DashboardView posts={posts} discs={discs} onDetail={id=>{ setDetailId(id); setView('feed'); }} onAssign={assignPost}/>
      ) : (
        <FeedView posts={posts} filters={filters} setFilters={setFilters} onDetail={setDetailId} onVote={vote} sessionVotes={sessionVotes} onCompose={()=>nav('compose')}/>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
