<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaFlow - 社内意見改善ワークフロー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        #root:empty {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #64748b;
        }
        #root:empty::after {
            content: "Loading Application...";
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // アイコンコンポーネントの修正版
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                // lucide.createIcons を使用して描画
                if (window.lucide && iconRef.current) {
                    // data-lucide 属性をセット
                    iconRef.current.setAttribute('data-lucide', name.toLowerCase().replace(/([a-z])([A-Z])/g, '$1-$2'));
                    window.lucide.createIcons({
                        attrs: {
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2
                        },
                        nameAttr: 'data-lucide',
                        icons: window.lucide.icons
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const initialPosts = [
            {
                id: 1, authorId: 'user1', authorName: '田中', isAnonymous: false, 
                content: 'リモートワークの補助金制度を拡充してほしいです。', 
                category: '人事', status: '検討中', aiSummary: 'リモートワーク補助金の拡充要望', 
                aiIntent: '改善案', aiScore: 78, createdAt: '2026-04-01 09:00', updatedAt: '2026-04-01 09:00'
            },
            {
                id: 2, authorId: 'user2', authorName: '匿名ユーザー', isAnonymous: true, 
                content: '会議室の予約システムが使いづらいです。', 
                category: '環境', status: '完了', aiSummary: '会議室予約システムの改善要望', 
                aiIntent: '問題提起', aiScore: 65, createdAt: '2026-04-03 11:20', updatedAt: '2026-04-10 15:45'
            }
        ];

        const USERS = {
            employee: { id: 'user_emp', name: '一般社員', role: 'employee' },
            manager: { id: 'mgr1', name: '富竹', role: 'manager' }
        };

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('all'); 
            const [posts, setPosts] = useState(initialPosts);
            const [selectedPost, setSelectedPost] = useState(null);
            const [categoryFilter, setCategoryFilter] = useState('All');

            const handleLoginEmployee = () => {
                setCurrentUser(USERS.employee);
                setIsLoggedIn(true);
            };

            const handleLoginManager = () => {
                const pass = prompt("管理職パスワードを入力してください (tomitake_flush1998)");
                if (pass === "tomitake_flush1998") {
                    setCurrentUser(USERS.manager);
                    setIsLoggedIn(true);
                } else {
                    alert("認証失敗");
                }
            };

            const handleStatusChange = (postId, newStatus) => {
                const now = new Date().toLocaleString('ja-JP');
                const updated = posts.map(p => p.id === postId ? { ...p, status: newStatus, updatedAt: now } : p);
                setPosts(updated);
                setSelectedPost(updated.find(p => p.id === postId));
            };

            const filteredPosts = posts
                .filter(p => categoryFilter === 'All' || p.category === categoryFilter)
                .filter(p => activeTab === 'completed' ? p.status === '完了' : p.status !== '完了');

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100">
                        <div className="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border border-slate-200">
                            <div className="flex justify-center mb-4 text-blue-600">
                                <Icon name="Sparkles" size={48} />
                            </div>
                            <h1 className="text-4xl font-black mb-2 text-slate-800 tracking-tighter">IdeaFlow</h1>
                            <p className="text-slate-500 mb-8 text-sm">社内の意見をAIで可視化・改善</p>
                            <div className="space-y-4">
                                <button onClick={handleLoginEmployee} className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold hover:bg-slate-100 transition-all flex items-center justify-center gap-3 text-slate-700 group">
                                    <Icon name="User" size={20} className="text-slate-400 group-hover:text-blue-500" /> 一般社員としてログイン
                                </button>
                                <button onClick={handleLoginManager} className="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-3 group">
                                    <Icon name="ShieldAlert" size={20} className="text-blue-200 group-hover:text-white" /> 管理職としてログイン
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b px-6 h-16 flex items-center justify-between sticky top-0 z-30 shadow-sm">
                        <div className="flex items-center gap-2 font-black text-xl text-slate-900 cursor-pointer" onClick={() => {setSelectedPost(null); setActiveTab('all');}}>
                            <Icon name="Sparkles" className="text-blue-600" /> IdeaFlow
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 bg-slate-100 px-4 py-1.5 rounded-full">
                                <Icon name="User" size={14} className="text-slate-400" />
                                <span className="text-xs font-bold text-slate-600">{currentUser.name}</span>
                            </div>
                            <button onClick={() => setIsLoggedIn(false)} className="text-xs text-slate-400 hover:text-red-500 transition-colors font-bold">ログアウト</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full py-8 px-6 flex flex-col md:flex-row gap-8 flex-1 overflow-hidden">
                        <aside className="w-full md:w-48 flex-shrink-0 flex flex-row md:flex-col gap-2">
                            <button onClick={() => {setActiveTab('all'); setSelectedPost(null);}} className={`flex-1 md:flex-none p-3 rounded-xl text-sm font-bold text-left flex items-center gap-2 transition-all ${activeTab === 'all' && !selectedPost ? 'bg-blue-600 text-white shadow-md shadow-blue-100' : 'bg-white md:bg-transparent border border-slate-200 md:border-none hover:bg-slate-200'}`}>
                                <Icon name="FileText" size={16}/> すべての意見
                            </button>
                            <button onClick={() => {setActiveTab('completed'); setSelectedPost(null);}} className={`flex-1 md:flex-none p-3 rounded-xl text-sm font-bold text-left flex items-center gap-2 transition-all ${activeTab === 'completed' && !selectedPost ? 'bg-emerald-600 text-white shadow-md shadow-emerald-100' : 'bg-white md:bg-transparent border border-slate-200 md:border-none hover:bg-slate-200'}`}>
                                <Icon name="CheckSquare" size={16}/> 反映済み
                            </button>
                        </aside>

                        <div className="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col min-h-[500px]">
                            {selectedPost ? (
                                <div className="p-8 animate-in fade-in duration-300 overflow-y-auto">
                                    <button onClick={() => setSelectedPost(null)} className="text-blue-600 font-bold mb-6 flex items-center gap-1 hover:underline">
                                        <Icon name="ChevronLeft" size={16}/> 一覧に戻る
                                    </button>
                                    <div className="mb-6">
                                        <div className="flex items-center gap-3 mb-2">
                                            <span className={`px-3 py-1 rounded-full text-[10px] font-black uppercase border ${selectedPost.status === '完了' ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-yellow-100 text-yellow-800 border-yellow-200'}`}>
                                                {selectedPost.status}
                                            </span>
                                            <span className="text-[10px] font-bold text-slate-400 flex items-center gap-1">
                                                <Icon name="Clock" size={12} /> 更新: {selectedPost.updatedAt}
                                            </span>
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-800 leading-tight">{selectedPost.aiSummary}</h2>
                                    </div>
                                    <div className="bg-slate-50 p-8 rounded-3xl border border-slate-100 mb-8 text-slate-700 leading-relaxed text-lg whitespace-pre-wrap">
                                        {selectedPost.content}
                                    </div>
                                    
                                    {currentUser.role === 'manager' && (
                                        <div className="bg-blue-50 p-6 rounded-2xl border border-blue-100 shadow-inner">
                                            <h3 className="text-xs font-black text-blue-600 mb-4 uppercase tracking-widest flex items-center gap-2">
                                                <Icon name="ShieldAlert" size={14}/> ステータス管理
                                            </h3>
                                            <div className="flex flex-wrap gap-2">
                                                {['検討中', '対応中', '完了'].map(st => (
                                                    <button 
                                                        key={st} 
                                                        onClick={() => handleStatusChange(selectedPost.id, st)} 
                                                        className={`px-6 py-2.5 rounded-xl text-sm font-bold border-2 transition-all ${selectedPost.status === st ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-600 border-slate-100 hover:border-blue-300'}`}
                                                    >
                                                        {st}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="flex flex-col h-full">
                                    <div className="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                                        <span className="font-black text-slate-400 uppercase text-[10px] tracking-widest flex items-center gap-2 px-2">
                                            <Icon name="Filter" size={12}/> {activeTab === 'completed' ? 'Reflected Archive' : 'Incoming Ideas'}
                                        </span>
                                        <select className="text-xs font-bold border border-slate-200 rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500 bg-white" onChange={e => setCategoryFilter(e.target.value)} value={categoryFilter}>
                                            <option value="All">すべてのカテゴリ</option>
                                            <option value="人事">人事</option>
                                            <option value="環境">環境</option>
                                            <option value="業務効率化">業務効率化</option>
                                        </select>
                                    </div>
                                    <div className="divide-y divide-slate-100 overflow-y-auto">
                                        {filteredPosts.map(post => (
                                            <div key={post.id} onClick={() => setSelectedPost(post)} className="p-6 hover:bg-slate-50 cursor-pointer transition-all flex justify-between items-center group">
                                                <div className="flex-1 pr-4">
                                                    <div className="flex items-center gap-3 mb-1.5">
                                                        <span className={`text-[9px] font-black px-2 py-0.5 rounded border ${post.status === '完了' ? 'text-emerald-600 border-emerald-100 bg-emerald-50' : 'text-yellow-600 border-yellow-100 bg-yellow-50'}`}>
                                                            {post.status}
                                                        </span>
                                                        <span className="text-[9px] font-black text-blue-500 bg-blue-50 px-2 py-0.5 rounded">#{post.category}</span>
                                                    </div>
                                                    <h3 className="font-black text-lg text-slate-800 group-hover:text-blue-600 transition-colors leading-snug">{post.aiSummary}</h3>
                                                    <p className="text-xs text-slate-400 mt-1 flex items-center gap-1">
                                                        <Icon name="Clock" size={10} /> {post.updatedAt}
                                                    </p>
                                                </div>
                                                <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-300 group-hover:bg-blue-50 group-hover:text-blue-500 transition-all">
                                                    <Icon name="ChevronRight" size={20} />
                                                </div>
                                            </div>
                                        ))}
                                        {filteredPosts.length === 0 && (
                                            <div className="p-24 text-center">
                                                <div className="flex justify-center mb-4 text-slate-200">
                                                    <Icon name="Inbox" size={64} />
                                                </div>
                                                <p className="text-slate-300 font-black text-xl uppercase tracking-widest">No Data Found</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
