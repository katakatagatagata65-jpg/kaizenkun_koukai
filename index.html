<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaFlow - 社内意見改善ワークフロー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // ブラウザ版CDNでは lucideReact というグローバル変数に格納されます
        const { 
            MessageSquare, AlertCircle, CheckCircle, Clock, XCircle, 
            Send, User, Bot, RefreshCw, Star, Filter, MessageCircle, ChevronRight,
            ShieldAlert, Sparkles, FileText, Lock, Eye, EyeOff, CheckSquare 
        } = lucideReact;

        // --- API Configurations ---
        const apiKey = ""; 

        const generateAIAnalysis = async (content) => {
            if (!apiKey) {
                return {
                    summary: content.length > 30 ? content.substring(0, 30) + '...' : content,
                    intent: ['改善案', '不満', '問題提起'][Math.floor(Math.random() * 3)],
                    score: Math.floor(Math.random() * 50) + 50,
                    category: "その他"
                };
            }

            const systemPrompt = `あなたは社内意見を整理する優秀なアシスタントAIです。分析結果をJSONで返してください。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: content }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (resultText) return JSON.parse(resultText);
            } catch (error) {
                console.error("AI Analysis Error:", error);
            }
            return { summary: "要約エラー", intent: "不明", score: 50, category: "その他" };
        };

        // --- Initial Data ---
        const initialPosts = [
            {
                id: 1, authorId: 'user1', authorName: '田中', isAnonymous: false, 
                content: 'リモートワークの補助金制度を拡充してほしいです。', 
                category: '人事', status: '検討中', aiSummary: 'リモートワーク補助金の拡充要望', 
                aiIntent: '改善案', aiScore: 78, createdAt: '2026-04-01 09:00', updatedAt: '2026-04-01 09:00', parentId: null
            },
            {
                id: 2, authorId: 'user2', authorName: '匿名ユーザー', isAnonymous: true, 
                content: '会議室の予約システムが使いづらいです。', 
                category: '環境', status: '完了', aiSummary: '会議室予約システムの改善要望', 
                aiIntent: '問題提起', aiScore: 65, createdAt: '2026-04-03 11:20', updatedAt: '2026-04-10 15:45', parentId: null
            }
        ];

        const USERS = {
            employee: { id: 'user_emp', name: '一般社員', role: 'employee' },
            manager: { id: 'mgr1', name: '富竹', role: 'manager' }
        };

        const MGR_CREDENTIALS = {
            id: "tomitake",
            pass: "tomitake_flush1998"
        };

        const StatusBadge = ({ status }) => {
            const styles = {
                '検討中': 'bg-yellow-100 text-yellow-800 border-yellow-200',
                'アサイン済': 'bg-blue-100 text-blue-800 border-blue-200',
                '対応中': 'bg-indigo-100 text-indigo-800 border-indigo-200',
                '保留': 'bg-gray-100 text-gray-800 border-gray-200',
                '却下': 'bg-red-100 text-red-800 border-red-200',
                '完了': 'bg-emerald-100 text-emerald-800 border-emerald-200'
            };
            return (
                <span className={`px-2.5 py-0.5 rounded-full text-xs font-bold border ${styles[status] || 'bg-gray-100'}`}>
                    {status}
                </span>
            );
        };

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [showMgrLogin, setShowMgrLogin] = useState(false);
            const [loginForm, setLoginForm] = useState({ id: '', pass: '' });
            const [loginError, setLoginError] = useState('');
            
            const [activeTab, setActiveTab] = useState('all'); 
            const [posts, setPosts] = useState(initialPosts);
            const [discussions, setDiscussions] = useState([]);
            const [selectedPost, setSelectedPost] = useState(null);
            const [isComposing, setIsComposing] = useState(false);
            const [composeData, setComposeData] = useState({ content: '', isAnonymous: false, parentId: null });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [chatMessage, setChatMessage] = useState('');
            const [rejectionInput, setRejectionInput] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('All');

            const getCurrentDateTime = () => {
                const now = new Date();
                const Y = now.getFullYear();
                const M = String(now.getMonth() + 1).padStart(2, '0');
                const D = String(now.getDate()).padStart(2, '0');
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                return `${Y}-${M}-${D} ${h}:${m}`;
            };

            const handleLoginEmployee = () => {
                setCurrentUser(USERS.employee);
                setIsLoggedIn(true);
            };

            const handleLoginManager = (e) => {
                e.preventDefault();
                if (loginForm.id.trim() === MGR_CREDENTIALS.id && loginForm.pass.trim() === MGR_CREDENTIALS.pass) {
                    setCurrentUser(USERS.manager);
                    setIsLoggedIn(true);
                    setShowMgrLogin(false);
                } else {
                    setLoginError('認証に失敗しました。');
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUser(null);
                setSelectedPost(null);
            };

            const handlePostSubmit = async () => {
                if (!composeData.content.trim()) return;
                setIsSubmitting(true);
                const analysis = await generateAIAnalysis(composeData.content);
                const nowStr = getCurrentDateTime();
                const newPost = {
                    id: Date.now(),
                    authorId: currentUser.id,
                    authorName: composeData.isAnonymous ? '匿名ユーザー' : currentUser.name,
                    isAnonymous: composeData.isAnonymous,
                    content: composeData.content,
                    category: analysis.category,
                    status: '検討中',
                    aiSummary: analysis.summary,
                    aiIntent: analysis.intent,
                    aiScore: analysis.score,
                    createdAt: nowStr,
                    updatedAt: nowStr,
                    parentId: composeData.parentId
                };
                setPosts([newPost, ...posts]);
                setIsComposing(false);
                setComposeData({ content: '', isAnonymous: false, parentId: null });
                setIsSubmitting(false);
            };

            const handleStatusChange = (postId, newStatus) => {
                const nowStr = getCurrentDateTime();
                const updatedPosts = posts.map(p => 
                    p.id === postId ? { ...p, status: newStatus, updatedAt: nowStr } : p
                );
                setPosts(updatedPosts);
                setSelectedPost(updatedPosts.find(p => p.id === postId));
            };

            const handleChatSubmit = (postId) => {
                if (!chatMessage.trim()) return;
                const newChat = {
                    id: Date.now(),
                    postId,
                    authorName: currentUser.name,
                    message: chatMessage,
                    role: currentUser.role,
                    time: getCurrentDateTime()
                };
                setDiscussions([...discussions, newChat]);
                setChatMessage('');
            };

            const filteredPosts = posts
                .filter(p => categoryFilter === 'All' || p.category === categoryFilter)
                .filter(p => {
                    if (activeTab === 'completed') return p.status === '完了';
                    return p.status !== '完了';
                })
                .sort((a, b) => activeTab === 'ranking' ? b.aiScore - a.aiScore : b.id - a.id);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-200">
                            <div className="flex justify-center mb-6"><Sparkles className="text-blue-600" size={48} /></div>
                            <h1 className="text-3xl font-bold text-center mb-8 tracking-tight text-slate-800">IdeaFlow</h1>
                            {!showMgrLogin ? (
                                <div className="space-y-4">
                                    <button onClick={handleLoginEmployee} className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl flex items-center gap-4 hover:bg-slate-100 transition-all group">
                                        <User className="text-slate-500" />
                                        <div className="text-left font-bold text-slate-700">一般社員ログイン</div>
                                    </button>
                                    <button onClick={() => setShowMgrLogin(true)} className="w-full bg-blue-50 border-2 border-blue-100 p-4 rounded-xl flex items-center gap-4 hover:bg-blue-100 transition-all text-blue-800 group">
                                        <ShieldAlert className="text-blue-600" />
                                        <div className="text-left font-bold">管理職ログイン</div>
                                    </button>
                                </div>
                            ) : (
                                <form onSubmit={handleLoginManager} className="space-y-4">
                                    <input type="text" placeholder="ID" className="w-full border p-3 rounded-lg" value={loginForm.id} onChange={e => setLoginForm({...loginForm, id: e.target.value})} />
                                    <input type="password" placeholder="Password" className="w-full border p-3 rounded-lg" value={loginForm.pass} onChange={e => setLoginForm({...loginForm, pass: e.target.value})} />
                                    {loginError && <p className="text-red-500 text-xs">{loginError}</p>}
                                    <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">ログイン</button>
                                    <button type="button" onClick={() => setShowMgrLogin(false)} className="w-full text-slate-400 text-xs">キャンセル</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b px-6 h-16 flex items-center justify-between shadow-sm sticky top-0 z-10">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setSelectedPost(null); setIsComposing(false);}}>
                            <Sparkles className="text-blue-600" size={24} />
                            <h1 className="text-xl font-black">IdeaFlow</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-bold bg-slate-100 px-3 py-1 rounded-full flex items-center gap-2">
                                <User size={14}/> {currentUser.name}
                            </span>
                            <button onClick={() => setIsComposing(true)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">新規投稿</button>
                            <button onClick={handleLogout} className="text-slate-400 text-xs">ログアウト</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto w-full py-8 px-6 flex gap-8 flex-1 overflow-hidden">
                        <aside className="w-52 flex-shrink-0 flex flex-col gap-2">
                            <button onClick={() => {setActiveTab('all'); setSelectedPost(null);}} className={`flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-bold ${activeTab === 'all' ? 'bg-blue-50 text-blue-600' : 'text-slate-500'}`}><FileText size={18}/> すべて</button>
                            <button onClick={() => {setActiveTab('ranking'); setSelectedPost(null);}} className={`flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-bold ${activeTab === 'ranking' ? 'bg-blue-50 text-blue-600' : 'text-slate-500'}`}><Star size={18}/> AIスコア順</button>
                            <button onClick={() => {setActiveTab('completed'); setSelectedPost(null);}} className={`flex items-center gap-3 px-4 py-2 rounded-lg text-sm font-bold ${activeTab === 'completed' ? 'bg-emerald-50 text-emerald-600' : 'text-slate-500'}`}><CheckSquare size={18}/> 反映済み</button>
                        </aside>

                        <div className="flex-1 bg-white border rounded-2xl shadow-sm overflow-hidden flex flex-col">
                            {isComposing ? (
                                <div className="p-8 space-y-6">
                                    <h2 className="text-2xl font-bold">新規意見の投稿</h2>
                                    <textarea className="w-full border rounded-xl p-4 min-h-[200px]" placeholder="内容を入力..." value={composeData.content} onChange={e => setComposeData({...composeData, content: e.target.value})} />
                                    <button onClick={handlePostSubmit} disabled={isSubmitting} className="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold">{isSubmitting ? "送信中..." : "送信する"}</button>
                                </div>
                            ) : selectedPost ? (
                                <div className="flex flex-col h-full overflow-y-auto">
                                    <div className="p-8 space-y-4">
                                        <button onClick={() => setSelectedPost(null)} className="text-blue-600 font-bold text-sm">← 戻る</button>
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-3"><StatusBadge status={selectedPost.status} /><span className="text-xs text-slate-400">{selectedPost.updatedAt}</span></div>
                                            <div className="text-2xl font-bold text-indigo-600">Score: {selectedPost.aiScore}</div>
                                        </div>
                                        <h2 className="text-3xl font-bold">{selectedPost.aiSummary}</h2>
                                        <div className="bg-slate-50 p-6 rounded-xl">{selectedPost.content}</div>
                                        
                                        {currentUser.role === 'manager' && (
                                            <div className="border-t pt-6 flex gap-2">
                                                {['検討中', '対応中', '完了'].map(s => (
                                                    <button key={s} onClick={() => handleStatusChange(selectedPost.id, s)} className={`px-4 py-2 rounded-lg font-bold border ${selectedPost.status === s ? 'bg-blue-600 text-white' : 'bg-white'}`}>{s}</button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    <div className="bg-slate-50 p-8 border-t flex-1">
                                        <h3 className="font-bold mb-4">議論</h3>
                                        <div className="space-y-4 mb-4">
                                            {discussions.filter(d => d.postId === selectedPost.id).map(d => (
                                                <div key={d.id} className="bg-white p-3 rounded-lg border shadow-sm">
                                                    <div className="font-bold text-xs mb-1">{d.authorName} <span className="text-slate-300 font-normal">{d.time}</span></div>
                                                    <div className="text-sm">{d.message}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input className="flex-1 border p-2 rounded-lg" value={chatMessage} onChange={e => setChatMessage(e.target.value)} />
                                            <button onClick={() => handleChatSubmit(selectedPost.id)} className="bg-slate-800 text-white px-4 rounded-lg">送信</button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="divide-y overflow-y-auto">
                                    {filteredPosts.map(post => (
                                        <div key={post.id} onClick={() => setSelectedPost(post)} className="p-6 hover:bg-slate-50 cursor-pointer flex justify-between items-center">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1"><StatusBadge status={post.status} /><span className="text-[10px] text-slate-300">{post.updatedAt}</span></div>
                                                <h3 className="font-bold text-lg">{post.aiSummary}</h3>
                                                <div className="text-xs text-slate-400">{post.authorName} | {post.category}</div>
                                            </div>
                                            <div className="text-2xl font-black text-indigo-400">{post.aiScore}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
